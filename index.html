<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>製藥工作臺 - 調配挑戰</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #2b7a6e 0%, #1e5a50 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', 'Poppins', 'Comic Neue', system-ui, -apple-system, 'Chalkboard SE', cursive, sans-serif;
            padding: 20px;
            margin: 0;
        }

        .workspace {
            max-width: 1300px;
            width: 100%;
            background-color: #c3e8e0;
            border-radius: 56px 48px 56px 48px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3), inset 0 1px 2px rgba(255,255,255,0.6);
            padding: 20px 24px 28px;
            transition: all 0.2s;
        }

        .bordered {
            border: 3px solid #2c5a4f;
            border-radius: 32px;
            background-color: #fef9e8;
            box-shadow: 0 6px 0 #1e3e35;
            transition: 0.07s linear;
        }
        .bordered:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1e3e35;
        }

        input, button {
            font-family: inherit;
        }
        button {
            cursor: pointer;
            font-weight: bold;
            background: #ffde9c;
            border: none;
            font-size: 1rem;
            padding: 8px 18px;
        }
        button:active {
            transform: translateY(2px);
        }

        .title-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .title-area h1 {
            font-size: 2.5rem;
            margin: 0;
            display: inline-block;
            padding: 10px 28px;
            background: #fff1c1;
            border-radius: 50px;
            letter-spacing: 3px;
            color: #1f4e43;
            text-shadow: 2px 2px 0 #b9d8ce;
            box-shadow: 0 6px 0 #7c9f92;
        }
        .operation-hint {
            margin-top: 12px;
            margin-bottom: 6px;
            text-align: center;
        }
        .hint-badge {
            display: inline-block;
            background: #f9eec1;
            border: 2px solid #548072;
            border-radius: 50px;
            padding: 6px 20px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #2c5a4f;
            box-shadow: 0 2px 0 #8faa9e;
        }
        .hint-badge span {
            margin-right: 6px;
            font-size: 1rem;
        }

        .double-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 30px;
            align-items: stretch;
        }
        .left-panel {
            flex: 1;
            min-width: 240px;
            max-width: 320px;
        }
        .right-panel {
            flex: 1.5;
            min-width: 280px;
        }

        .medicine-box {
            background: #ffeed5;
            border-radius: 40px;
            padding: 20px 16px;
            text-align: center;
            margin-bottom: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .medicine-icon {
            font-size: 3.2rem;
            display: block;
            margin-bottom: 10px;
        }
        .start-btn {
            background: #f3b33d;
            color: #2d3e36;
            font-size: 1.4rem;
            padding: 10px 16px;
            width: 85%;
            border-radius: 50px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 5px 0 #b4621a;
            margin: 0 auto;
        }
        .start-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b4621a;
        }
        .info-tip {
            margin-top: 12px;
            text-align: center;
            font-style: italic;
            background: #ddddb0;
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.85rem;
        }

        .right-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
        }
        .target-ratio-box {
            background: #f2e5cf;
            padding: 16px;
            border-radius: 40px;
            text-align: center;
        }
        .target-label {
            font-size: 1.1rem;
            font-weight: bold;
            background: #d9c79a;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            margin-bottom: 10px;
        }
        .target-value {
            font-size: 2rem;
            font-weight: bold;
            background: white;
            display: inline-block;
            padding: 6px 24px;
            border-radius: 50px;
            font-family: monospace;
            letter-spacing: 2px;
            color: #2c6b5c;
        }

        .input-card {
            background: #fffaf0;
            padding: 16px;
            border-radius: 40px;
        }
        .ratio-input-group {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        .ratio-input-group input {
            width: 110px;
            font-size: 1.5rem;
            text-align: center;
            border: 3px solid #548072;
            border-radius: 36px;
            background: white;
            padding: 6px 0;
            font-weight: bold;
            outline: none;
        }
        .ratio-input-group input[type="number"] {
            -moz-appearance: textfield;
        }
        .ratio-input-group input[type="number"]::-webkit-inner-spin-button,
        .ratio-input-group input[type="number"]::-webkit-outer-spin-button {
            opacity: 0.5;
        }
        .ratio-colon {
            font-size: 2rem;
            font-weight: bold;
            color: #3f6a5e;
        }
        .confirm-btn {
            background: #6ecfaa;
            font-size: 1.1rem;
            padding: 6px 28px;
            border-radius: 50px;
            margin-top: 6px;
        }

        .effect-area {
            min-height: 70px;
            margin: 8px 0 16px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
        }
        .success-effect {
            animation: sparkle 0.6s ease-in-out;
            background: radial-gradient(circle, gold, #ffb347);
            display: inline-block;
            padding: 10px 24px;
            border-radius: 50px;
            color: #2d2b1f;
            box-shadow: 0 0 18px #ffd966;
            font-size: 1.4rem;
        }
        .fail-effect {
            animation: shake 0.4s ease-in-out;
            background: #f5b7a8;
            display: inline-block;
            padding: 10px 24px;
            border-radius: 50px;
            color: #8b3c2c;
            box-shadow: 0 0 8px #e67e5a;
            font-size: 1.4rem;
        }
        @keyframes sparkle {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); background: #ffdd77; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .table-container {
            overflow-x: auto;
            border-radius: 40px;
            background: #e5f3ef;
            padding: 8px;
        }
        .record-table {
            width: 100%;
            border-collapse: collapse;
            background: #fef7e6;
            border-radius: 28px;
            overflow: hidden;
            font-size: 0.9rem;
        }
        .record-table th, .record-table td {
            border: 2px solid #578f7f;
            padding: 8px 6px;
            text-align: center;
            font-weight: bold;
        }
        .record-table th {
            background: #c7e2d9;
            font-size: 1rem;
            color: #1f4e3c;
        }
        .check-mark {
            font-size: 1.3rem;
            color: #2b7a42;
        }
        .fail-mark {
            font-size: 1.2rem;
            color: #c95a49;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-family: inherit;
        }
        .modal-card {
            background: #fff9ef;
            border-radius: 56px;
            padding: 24px 28px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            border: 4px solid #2c5a4f;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        .modal-card h3 {
            font-size: 1.8rem;
            margin: 0 0 10px;
            color: #2d5a4c;
        }
        .modal-card p {
            font-size: 1rem;
            margin-bottom: 16px;
        }
        .modal-input-group {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 12px;
            margin: 16px 0;
        }
        .modal-input-group input {
            width: 110px;
            font-size: 1.6rem;
            text-align: center;
            border: 3px solid #548072;
            border-radius: 40px;
            padding: 6px;
            font-weight: bold;
        }
        .modal-colon {
            font-size: 2rem;
            font-weight: bold;
        }
        .modal-btn {
            background: #6ecfaa;
            font-size: 1.2rem;
            padding: 8px 24px;
            margin-top: 8px;
            border-radius: 40px;
        }
        .modal-warning {
            color: #c95a49;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        @media (max-width: 750px) {
            .workspace { padding: 16px; }
            .target-value { font-size: 1.6rem; }
            .ratio-input-group input { width: 85px; font-size: 1.2rem; }
            .left-panel { max-width: 100%; }
            .double-panel { flex-direction: column; }
            .medicine-box { height: auto; }
        }
        footer {
            text-align: center;
            font-size: 0.8rem;
            margin-top: 14px;
            opacity: 0.8;
            color: #2c5a4f;
            background: #e0f0ea;
            display: inline-block;
            width: auto;
            padding: 4px 18px;
            border-radius: 36px;
        }
        .footer-container {
            text-align: center;
        }
        .inline-tip {
            font-size: 0.8rem;
            margin-top: 8px;
            color: #4a6b5f;
        }
    </style>
</head>
<body>
<div class="workspace">
    <div class="title-area">
        <h1 class="bordered">🧪 製藥工作臺 🧴</h1>
        <div class="operation-hint">
            <div class="hint-badge">
                <span>✨</span> 點擊開始製作，設定目標比，然後輸入調配比，看看是否成功 <span>✨</span>
            </div>
        </div>
    </div>

    <div class="double-panel">
        <!-- 左側：藥盒 + 開始製作按鈕 -->
        <div class="left-panel">
            <div class="medicine-box bordered">
                <div class="medicine-icon">💊🧪</div>
                <button id="startMakeBtn" class="start-btn bordered">✨ 開始製作 ✨</button>
                <div class="info-tip">📌 點擊設定目標比，開始挑戰</div>
            </div>
        </div>

        <!-- 右側：今日目標比 + 調配比輸入框 -->
        <div class="right-panel">
            <div class="right-stack">
                <!-- 目標比區塊 (初始隱藏) -->
                <div id="targetRatioArea" style="display: none;" class="target-ratio-box bordered">
                    <div class="target-label">🎯 今日目標比 🎯</div>
                    <div id="targetRatioDisplay" class="target-value">— : —</div>
                </div>

                <!-- 調配比輸入區塊 (初始隱藏) -->
                <div id="dynamicInputArea" style="display: none;">
                    <div id="userInputCard" class="input-card bordered">
                        <div style="font-weight: bold; font-size:1.1rem; text-align:center;">🧙 調配比 🧙</div>
                        <div class="ratio-input-group">
                            <input type="number" id="userFront" placeholder="前項" value="" step="any" inputmode="decimal" class="bordered">
                            <span class="ratio-colon">:</span>
                            <input type="number" id="userBack" placeholder="後項" value="" step="any" inputmode="decimal" class="bordered">
                        </div>
                        <div style="text-align:center;">
                            <button id="confirmUserRatioBtn" class="confirm-btn bordered">📝 確認輸入</button>
                        </div>
                        <div class="inline-tip" style="text-align:center;">💡 可以反覆輸入不同配方，每次都會記錄結果</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="effectMessage" class="effect-area"></div>

    <div id="tableWrapper" style="display: none;" class="table-container bordered">
        <table class="record-table">
            <thead>
                <tr><th>次數</th><th>目標比</th><th>輸入的調配比</th><th>製藥成功與否</th>
                </thead>
            <tbody id="recordTableBody"></tbody>
          </table>
        <div class="info-tip">📊 記錄每次調配結果，看看哪些配方能成功！</div>
    </div>
    <div class="footer-container">
        <footer>⚗️ 試試不同數字組合，探索成功的秘密 ⚗️</footer>
    </div>
</div>

<script>
    // ---------- 狀態管理 ----------
    let targetRatio = null;          
    let currentSessionActive = false;
    let recordList = [];

    // DOM 元素
    const startBtn = document.getElementById('startMakeBtn');
    const targetRatioArea = document.getElementById('targetRatioArea');
    const targetRatioDisplay = document.getElementById('targetRatioDisplay');
    const dynamicInputArea = document.getElementById('dynamicInputArea');
    const confirmUserBtn = document.getElementById('confirmUserRatioBtn');
    const tableWrapper = document.getElementById('tableWrapper');
    const recordBody = document.getElementById('recordTableBody');
    const effectDiv = document.getElementById('effectMessage');

    const userFrontInput = document.getElementById('userFront');
    const userBackInput = document.getElementById('userBack');

    // 讓數字輸入框支援小數鍵盤
    function setupDecimalInputs() {
        const numberInputs = [userFrontInput, userBackInput];
        numberInputs.forEach(input => {
            if (input) {
                input.step = "any";
                input.inputMode = "decimal";
            }
        });
    }

    // 計算比值
    function computeRatioValue(front, back) {
        if (back === 0 || back === null || isNaN(back)) return null;
        return front / back;
    }

    function formatRatio(front, back) {
        const formatNum = (num) => {
            if (Number.isInteger(num)) return num.toString();
            let str = num.toFixed(6);
            str = str.replace(/\.?0+$/, '');
            return str;
        };
        return `${formatNum(front)} : ${formatNum(back)}`;
    }

    // 顯示目標比設定模態框
    function showTargetInputModal() {
        return new Promise((resolve) => {
            const modalOverlay = document.createElement('div');
            modalOverlay.className = 'modal-overlay';
            modalOverlay.innerHTML = `
                <div class="modal-card bordered">
                    <h3>🧪 設定目標比 🧪</h3>
                    <p>請輸入本次製藥的目標比值（前項 : 後項）</p>
                    <div class="modal-input-group">
                        <input type="number" id="modalFront" placeholder="前項" value="2" step="any" inputmode="decimal" class="bordered">
                        <span class="modal-colon">:</span>
                        <input type="number" id="modalBack" placeholder="後項" value="1" step="any" inputmode="decimal" class="bordered">
                    </div>
                    <button id="modalConfirmBtn" class="modal-btn bordered">✨ 確定目標 ✨</button>
                    <div id="modalWarning" class="modal-warning"></div>
                </div>
            `;
            document.body.appendChild(modalOverlay);

            const frontInput = modalOverlay.querySelector('#modalFront');
            const backInput = modalOverlay.querySelector('#modalBack');
            const confirmBtn = modalOverlay.querySelector('#modalConfirmBtn');
            const warningDiv = modalOverlay.querySelector('#modalWarning');

            frontInput.step = "any";
            frontInput.inputMode = "decimal";
            backInput.step = "any";
            backInput.inputMode = "decimal";
            frontInput.focus();

            const cleanModal = () => {
                modalOverlay.remove();
            };

            const handleConfirm = () => {
                let frontVal = frontInput.value.trim();
                let backVal = backInput.value.trim();
                if (frontVal === '' || backVal === '') {
                    warningDiv.innerText = '請完整填寫前項和後項！';
                    return;
                }
                const frontNum = Number(frontVal);
                const backNum = Number(backVal);
                if (isNaN(frontNum) || isNaN(backNum)) {
                    warningDiv.innerText = '請輸入有效的數字（可為整數或小數）！';
                    return;
                }
                if (backNum === 0) {
                    warningDiv.innerText = '後項不能為 0，請重新輸入！';
                    return;
                }
                cleanModal();
                resolve({ front: frontNum, back: backNum });
            };

            confirmBtn.addEventListener('click', handleConfirm);
            const onKeyPress = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleConfirm();
                }
            };
            frontInput.addEventListener('keypress', onKeyPress);
            backInput.addEventListener('keypress', onKeyPress);
        });
    }

    // 初始化新回合
    async function initNewGameWithUserTarget() {
        userFrontInput.value = '';
        userBackInput.value = '';
        effectDiv.innerHTML = '';
        recordList = [];
        updateTableDisplay();
        
        const userTarget = await showTargetInputModal();
        targetRatio = {
            front: userTarget.front,
            back: userTarget.back,
            value: computeRatioValue(userTarget.front, userTarget.back)
        };
        
        targetRatioDisplay.innerText = formatRatio(targetRatio.front, targetRatio.back);
        targetRatioArea.style.display = 'block';
        dynamicInputArea.style.display = 'block';
        tableWrapper.style.display = 'block';
        currentSessionActive = true;
        userFrontInput.focus();
        
        effectDiv.innerHTML = '<div style="background:#d9f0ec; border-radius:40px; padding:6px 18px; display:inline-block; font-size:1rem;">✨ 目標已設定，開始調配 ✨</div>';
        setTimeout(() => {
            if (effectDiv.innerHTML.includes("目標已設定")) effectDiv.innerHTML = '';
        }, 1500);
    }

    function addRecord(targetStr, inputStr, isSuccess) {
        recordList.push({
            id: Date.now() + Math.random(),
            targetStr: targetStr,
            inputStr: inputStr,
            isSuccess: isSuccess
        });
        updateTableDisplay();
    }

    function updateTableDisplay() {
        if (!recordBody) return;
        if (recordList.length === 0) {
            recordBody.innerHTML = `</table><td colspan="4" style="text-align:center;">📋 還沒有製作記錄，快來調配藥方吧 📋</td>;</tr>`;
            return;
        }
        let html = '';
        recordList.forEach((rec, idx) => {
            const successMark = rec.isSuccess ? '<span class="check-mark">✅</span>' : '<span class="fail-mark">❌</span>';
            html += `<tr>
                        <td>${idx + 1}</td>
                        <td>${rec.targetStr}</td>
                        <td>${rec.inputStr}</td>
                        <td>${successMark}</td>
                      </tr>`;
        });
        recordBody.innerHTML = html;
    }

    function showSuccessEffect() {
        effectDiv.innerHTML = '<div class="success-effect">🎉 製藥成功！ 🧪✨</div>';
        setTimeout(() => {
            if (effectDiv.firstChild && effectDiv.firstChild.classList && effectDiv.firstChild.classList.contains('success-effect')) {
                effectDiv.innerHTML = '';
            }
        }, 2000);
    }

    function showFailEffect() {
        effectDiv.innerHTML = '<div class="fail-effect">😵 再試一試～ 💊</div>';
        setTimeout(() => {
            if (effectDiv.firstChild && effectDiv.firstChild.classList && effectDiv.firstChild.classList.contains('fail-effect')) {
                effectDiv.innerHTML = '';
            }
        }, 1600);
    }

    // 核心驗證邏輯
    function validateAndRecord(front, back) {
        if (!currentSessionActive || !targetRatio) {
            showFailEffect();
            return false;
        }
        
        if (front === '' || back === '' || isNaN(front) || isNaN(back)) {
            showFailEffect();
            return false;
        }
        const frontNum = Number(front);
        const backNum = Number(back);
        if (isNaN(frontNum) || isNaN(backNum)) {
            showFailEffect();
            return false;
        }
        if (backNum === 0) {
            showFailEffect();
            return false;
        }
        
        const inputRatioValue = computeRatioValue(frontNum, backNum);
        const targetVal = targetRatio.value;
        const isEqual = Math.abs(inputRatioValue - targetVal) < 1e-8;
        
        const targetStr = formatRatio(targetRatio.front, targetRatio.back);
        const inputStr = formatRatio(frontNum, backNum);
        
        addRecord(targetStr, inputStr, isEqual);
        
        if (isEqual) {
            showSuccessEffect();
            return true;
        } else {
            showFailEffect();
            return false;
        }
    }

    function onConfirmRatio() {
        if (!currentSessionActive) {
            showFailEffect();
            return;
        }
        let frontVal = userFrontInput.value.trim() === '' ? '' : userFrontInput.value;
        let backVal = userBackInput.value.trim() === '' ? '' : userBackInput.value;
        if (frontVal === '' || backVal === '') {
            showFailEffect();
            return;
        }
        const frontNum = Number(frontVal);
        const backNum = Number(backVal);
        if (isNaN(frontNum) || isNaN(backNum)) {
            showFailEffect();
            return;
        }
        validateAndRecord(frontNum, backNum);
    }

    async function onStartMake() {
        targetRatio = null;
        currentSessionActive = false;
        recordList = [];
        updateTableDisplay();
        targetRatioArea.style.display = 'none';
        dynamicInputArea.style.display = 'none';
        userFrontInput.value = '';
        userBackInput.value = '';
        effectDiv.innerHTML = '';
        tableWrapper.style.display = 'block';
        await initNewGameWithUserTarget();
    }

    // 綁定事件
    startBtn.addEventListener('click', onStartMake);
    confirmUserBtn.addEventListener('click', onConfirmRatio);

    // Enter 快捷鍵
    function setupEnterKey() {
        const inputs = [userFrontInput, userBackInput];
        inputs.forEach(input => {
            if (input) {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        onConfirmRatio();
                    }
                });
            }
        });
    }

    setupDecimalInputs();
    setupEnterKey();

    function initialUI() {
        targetRatioArea.style.display = 'none';
        dynamicInputArea.style.display = 'none';
        tableWrapper.style.display = 'none';
        recordList = [];
        updateTableDisplay();
        effectDiv.innerHTML = '';
        currentSessionActive = false;
        targetRatio = null;
    }
    initialUI();
</script>
</body>
</html>
